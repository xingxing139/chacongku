<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>号码查重系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .btn-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 mt-10">
        <h1 class="text-xl font-bold text-gray-800 mb-2">共享查重登记库</h1>
        <p class="text-sm text-gray-500 mb-6">输入任何号码，系统将自动检查是否重复</p>

        <input type="text" id="phone" placeholder="请输入手机号/ID/工号" 
               class="w-full text-lg p-4 border-2 border-gray-100 rounded-xl mb-4 focus:border-blue-500 focus:outline-none transition-all">

        <button onclick="startCheck()" id="btn"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg btn-active transition-all">
            开始核对并登记
        </button>

        <div id="result" class="mt-6 hidden p-4 rounded-xl text-center font-medium"></div>
    </div>

    <script>
        // 配置你的 Supabase 信息
        const SB_URL = "你的_SUPABASE_URL";
        const SB_KEY = "你的_ANON_KEY";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function startCheck() {
            const input = document.getElementById('phone').value.trim();
            const resBox = document.getElementById('result');
            const btn = document.getElementById('btn');

            if (!input) return;

            // 按钮加载动画
            btn.innerText = "正在核对...";
            btn.disabled = true;

            // 1. 查询是否存在
            const { data, error } = await supabase
                .from('public_check')
                .select('phone_number')
                .eq('phone_number', input)
                .maybeSingle();

            if (data) {
                // 重复了
                showResult("⚠️ 重复！该号码已在库中", "bg-red-50 text-red-600 border border-red-200");
            } else {
                // 未重复，尝试登记
                const { error: insErr } = await supabase
                    .from('public_check')
                    .insert([{ phone_number: input }]);
                
                if (!insErr) {
                    showResult("✅ 登记成功！库中无此号", "bg-green-50 text-green-600 border border-green-200");
                } else {
                    showResult("系统忙，请重试", "bg-gray-50 text-gray-600");
                }
            }
            btn.innerText = "开始核对并登记";
            btn.disabled = false;
        }

        function showResult(txt, cls) {
            const resBox = document.getElementById('result');
            resBox.innerText = txt;
            resBox.className = "mt-6 p-4 rounded-xl text-center font-medium " + cls;
            resBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
