<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奔驰总群系统查重库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%); min-height: 100vh; font-family: "Microsoft YaHei", sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .benz-btn { background: linear-gradient(90deg, #0078d4, #005a9e); transition: all 0.3s ease; }
        .benz-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="mb-8 text-center">
        <div class="inline-block p-4 rounded-full border-2 border-gray-400 mb-4">
            <div class="w-12 h-12 flex items-center justify-center text-white font-bold text-2xl">⭐</div>
        </div>
        <h1 class="text-white text-3xl font-light tracking-widest">奔驰总群系统查重库</h1>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-tighter">Mercedes-Benz Member Verification System</p>
    </div>

    <div class="w-full max-w-md glass-card rounded-3xl p-8 shadow-2xl">
        <div class="mb-6">
            <label class="block text-gray-400 text-xs mb-2 ml-1">请输入客户号码</label>
            <input type="text" id="phoneInput" placeholder="输入手机号或识别码" 
                   class="w-full bg-transparent border-b-2 border-gray-600 text-white text-xl py-3 px-1 focus:border-blue-500 outline-none transition-all">
        </div>

        <button id="mainBtn"
                class="w-full benz-btn text-white font-semibold py-4 rounded-xl shadow-lg text-lg tracking-wider mb-4">
            立即核验并录入
        </button>

        <div id="resultBox" class="hidden rounded-2xl p-4 text-center transform transition-all animate-pulse">
            <div id="resultIcon" class="text-3xl mb-1"></div>
            <div id="resultTitle" class="font-bold text-lg"></div>
            <div id="resultDesc" class="text-sm opacity-80 mt-1"></div>
        </div>
    </div>

    <p class="mt-10 text-gray-600 text-xs">© 2026 奔驰总群内部管理系统 · 隐私加密存储</p>

    <script>
    // ======= ⚠️ 核心修正配置 =======
    const SB_URL = "https://dhfbpzphsmsxfwsehuiv.supabase.co"; 
    // 重要：请去 Supabase 后台找那个以 eyJ 开头的 anon public key 替换下面这个！
    const SB_KEY = "sb_publishable_dRoHsGiruL3iH2pHEW-xoQ_ayujmNWw"; 
    // =============================================
let _db;

window.onload = () => {
    try {
        _db = supabase.createClient(SB_URL, SB_KEY);
        console.log("✅ 奔驰总群系统：标准化查重逻辑已激活");
        
        document.getElementById('mainBtn').addEventListener('click', function() {
            handleCheckAction();
        });
    } catch (e) {
        alert("系统初始化失败: " + e.message);
    }
};

async function handleCheckAction() {
    const input = document.getElementById('phoneInput');
    const btn = document.getElementById('mainBtn');
    const rawVal = input.value.trim();

    if (!rawVal) {
        alert("请输入有效号码");
        return;
    }

    // --- 【核心改进步骤】 ---
    // 使用正则 \D 匹配所有非数字字符并剔除
    const cleanVal = rawVal.replace(/\D/g, ''); 
    
    if (cleanVal.length === 0) {
        alert("请输入包含数字的有效号码");
        return;
    }
    // -----------------------

    btn.disabled = true;
    btn.innerText = "正在深度比对中...";
    document.getElementById('resultBox').classList.add('hidden');

    try {
        // 使用清洗后的号码进行查重
        const { data, error: queryErr } = await _db
            .from('benz_check_system')
            .select('customer_phone')
            .eq('customer_phone', cleanVal)
            .maybeSingle();

        if (queryErr) throw queryErr;

        if (data) {
            showResult("fail", "导入失败", `客户号码 [${cleanVal}] 已存在于总群库中`);
        } else {
            // 录入时也只录入清洗后的纯数字
            const { error: insErr } = await _db
                .from('benz_check_system')
                .insert([{ customer_phone: cleanVal }]);

            if (insErr) throw insErr;
            showResult("success", "导入成功", `号码 [${cleanVal}] 已通过核验并录入`);
            input.value = ""; 
        }
    } catch (err) {
        console.error(err);
        alert("系统提示: " + (err.message || "连接数据库失败"));
    } finally {
        btn.disabled = false;
        btn.innerText = "立即核验并录入";
    }
}

function showResult(type, title, desc) {
    const box = document.getElementById('resultBox');
    const rTitle = document.getElementById('resultTitle');
    const rDesc = document.getElementById('resultDesc');
    const rIcon = document.getElementById('resultIcon');
    box.classList.remove('hidden');
    rTitle.innerText = title;
    rDesc.innerText = desc;
    if (type === 'success') {
        box.className = "mt-6 rounded-2xl p-4 text-center bg-green-900/30 text-green-400 border border-green-500/50";
        rIcon.innerText = "✓";
    } else {
        box.className = "mt-6 rounded-2xl p-4 text-center bg-red-900/30 text-red-400 border border-red-500/50";
        rIcon.innerText = "✕";
    }
}
    </script>
</body>
</html>
