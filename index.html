<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自动登记查重系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center p-6">

    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-8 mt-12">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">号码自动登记库</h2>
        <p class="text-gray-500 text-sm mb-8">输入后自动保存，下次输入将提示重复。</p>

        <div class="space-y-4">
            <input type="text" id="phoneInput" placeholder="请输入号码（不限长度）" 
                   class="w-full border-2 border-gray-100 rounded-2xl p-4 text-lg focus:border-indigo-500 outline-none transition-all">
            
            <button onclick="processNumber()" id="mainBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">
                检查并自动保存
            </button>
        </div>

        <div id="statusBox" class="mt-8 p-5 rounded-2xl hidden flex items-center justify-center text-center font-bold">
            <span id="statusText"></span>
        </div>
    </div>

    <script>
        // 1. 配置你的 Supabase 钥匙
        const SUPABASE_URL = "你的_SUPABASE_URL"; 
        const SUPABASE_KEY = "你的_ANON_KEY";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function processNumber() {
            const inputField = document.getElementById('phoneInput');
            const btn = document.getElementById('mainBtn');
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            
            const val = inputField.value.trim();
            if (!val) return alert("请输入内容");

            // 按钮状态切换
            btn.disabled = true;
            btn.innerText = "正在同步数据库...";
            statusBox.classList.add('hidden');

            try {
                // 【核心逻辑 A】：先查重
                const { data, error } = await supabase
                    .from('public_check') // 确保你在Supabase里建的表名叫这个
                    .select('phone_number')
                    .eq('phone_number', val)
                    .maybeSingle();

                if (data) {
                    // 如果查到了，说明以前存过
                    showUI("⚠️ 该号码已存在！", "bg-orange-100 text-orange-700 border-2 border-orange-200");
                } else {
                    // 【核心逻辑 B】：如果没查到，立即自动保存
                    const { error: insertError } = await supabase
                        .from('public_check')
                        .insert([{ phone_number: val }]);

                    if (insertError) throw insertError;

                    showUI("✅ 登记成功！已存入数据库", "bg-green-100 text-green-700 border-2 border-green-200");
                    inputField.value = ""; // 清空输入框方便下一次输入
                }
            } catch (err) {
                console.error(err);
                showUI("❌ 数据库连接失败", "bg-red-100 text-red-700");
            } finally {
                btn.disabled = false;
                btn.innerText = "检查并自动保存";
            }
        }

        function showUI(text, className) {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            statusText.innerText = text;
            statusBox.className = `mt-8 p-5 rounded-2xl flex items-center justify-center text-center font-bold ${className}`;
            statusBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
