<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奔驰总群系统查重库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%); min-height: 100vh; font-family: "Microsoft YaHei", sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .benz-btn { background: linear-gradient(90deg, #0078d4, #005a9e); transition: all 0.3s ease; }
        .benz-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="mb-8 text-center">
        <div class="inline-block p-4 rounded-full border-2 border-gray-400 mb-4">
            <div class="w-12 h-12 flex items-center justify-center text-white font-bold text-2xl">⭐</div>
        </div>
        <h1 class="text-white text-3xl font-light tracking-widest">奔驰总群系统查重库</h1>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-tighter">Mercedes-Benz Member Verification System</p>
    </div>

    <div class="w-full max-w-md glass-card rounded-3xl p-8 shadow-2xl">
        <div class="mb-6">
            <label class="block text-gray-400 text-xs mb-2 ml-1">请输入客户号码</label>
            <input type="text" id="phoneInput" placeholder="输入手机号或识别码" 
                   class="w-full bg-transparent border-b-2 border-gray-600 text-white text-xl py-3 px-1 focus:border-blue-500 outline-none transition-all">
        </div>

        <div class="mb-6">
    <label class="block text-gray-400 text-xs mb-2 ml-1">安全验证码 (请输入 2026)</label>
    <input type="text" id="verifyInput" placeholder="请输入验证码" 
           class="w-full bg-transparent border-b-2 border-gray-600 text-white text-xl py-3 px-1 focus:border-blue-500 outline-none transition-all">
</div>

       <button id="mainBtn"
        class="w-full benz-btn text-white font-semibold py-4 rounded-xl shadow-lg text-lg tracking-wider mb-4">
    立即核验并录入
</button>

        <div id="resultBox" class="hidden rounded-2xl p-4 text-center transform transition-all animate-pulse">
            <div id="resultIcon" class="text-3xl mb-1"></div>
            <div id="resultTitle" class="font-bold text-lg"></div>
            <div id="resultDesc" class="text-sm opacity-80 mt-1"></div>
        </div>
    </div>

    <p class="mt-10 text-gray-600 text-xs">© 2026 奔驰总群内部管理系统 · 隐私加密存储</p>

  <script>
    
    async function handleCheckAction() {
        const input = document.getElementById('phoneInput');
        const btn = document.getElementById('mainBtn');
        const val = input.value.trim();

        // 1. 基础校验
        if (!val) {
            alert("请输入有效号码");
            return;
        }

        // 2. 界面进入加载状态
        btn.disabled = true;
        btn.innerText = "安全检索中...";
        hideResult();

        try {
            // 3. 请求后端接口 (Vercel 会自动处理 /api/check 路径)
            const response = await fetch('/api/check', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ phone: val })
            });

            // 检查服务器响应状态
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "服务器响应异常");
            }

            const result = await response.json();

            // 4. 根据后端结果显示 UI
            if (result.status === 'exists') {
                showResult("fail", "导入失败", "该客户号码已存在于总群数据库中");
            } else if (result.status === 'success') {
                showResult("success", "导入成功", "已通过核验并录入内部管理系统");
                input.value = ""; // 成功后清空
            } else {
                alert("系统提示: " + (result.error || "未知响应格式"));
            }

        } catch (err) {
            console.error("网络或接口错误:", err);
            alert("网络连接失败，请检查后端 API 是否部署成功");
        } finally {
            // 5. 恢复按钮状态
            btn.disabled = false;
            btn.innerText = "立即核验并录入";
        }
    }

    /**
     * UI 显示函数：展示结果卡片
     */
    function showResult(type, title, desc) {
        const box = document.getElementById('resultBox');
        const rTitle = document.getElementById('resultTitle');
        const rDesc = document.getElementById('resultDesc');
        const rIcon = document.getElementById('resultIcon');

        // 显示盒子
        box.classList.remove('hidden');
        rTitle.innerText = title;
        rDesc.innerText = desc;

        // 根据类型切换颜色和图标
        if (type === 'success') {
            // 成功样式：绿色
            box.className = "mt-6 rounded-2xl p-4 text-center bg-green-900/30 text-green-400 border border-green-500/50 transform transition-all";
            rIcon.innerText = "✓";
        } else {
            // 失败样式：红色
            box.className = "mt-6 rounded-2xl p-4 text-center bg-red-900/30 text-red-400 border border-red-500/50 transform transition-all";
            rIcon.innerText = "✕";
        }
    }

    /**
     * 辅助函数：隐藏结果卡片
     */
    function hideResult() {
        const box = document.getElementById('resultBox');
        if (box) box.classList.add('hidden');
    }

    // 绑定回车键快捷查询
    document.getElementById('phoneInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleCheckAction();
        }
    });

    // 绑定按钮点击
    document.getElementById('mainBtn').addEventListener('click', handleCheckAction);

    console.log("✅ 奔驰总群前端安全引擎已就绪，已切换至隐藏密钥模式");
</script>
</body>
</html>
